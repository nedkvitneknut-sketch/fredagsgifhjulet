<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fredagsgif-hjulet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  background:#f5f0e8;
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:2rem;
  padding:2rem 1rem;
  overflow:hidden;
  position:relative;
}

/* BIG BACKGROUND CIRCLE */
body::before{
  content:'';
  position:fixed;
  width:min(90vw,700px);height:min(90vw,700px);
  border-radius:50%;
  background:radial-gradient(circle, #ffe08a 0%, #ffb347 40%, #ff6b6b 70%, #c44dff 100%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  opacity:0.18;
  pointer-events:none;
  z-index:0;
  animation:bgPulse 6s ease-in-out infinite;
}
@keyframes bgPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.18}
  50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.24}
}

/* GRAIN TEXTURE */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:0.04;
  pointer-events:none;z-index:999;
}

.everything{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:2rem}

/* TITLE */
h1{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(2.4rem,6vw,4.5rem);
  letter-spacing:-2px;
  color:#1a1a1a;
  text-align:center;
  line-height:0.95;
  position:relative;
}
h1 em{
  font-style:normal;
  color:transparent;
  -webkit-text-stroke:2px #1a1a1a;
}
.sub{
  font-family:'DM Sans',sans-serif;
  font-weight:300;
  font-size:0.85rem;
  letter-spacing:4px;
  color:#888;
  text-transform:uppercase;
  text-align:center;
  margin-top:-0.8rem;
}

/* WHEEL */
.wheel-wrap{
  position:relative;
  width:420px;height:420px;
}

/* Decorative dashed ring */
.dashed-ring{
  position:absolute;
  inset:-28px;
  border-radius:50%;
  border:1.5px dashed rgba(0,0,0,0.12);
  animation:ringRot 30s linear infinite;
  pointer-events:none;
}
@keyframes ringRot{to{transform:rotate(360deg)}}

/* Dotted ring with accent dots */
.dot-ring{
  position:absolute;
  inset:-14px;
  border-radius:50%;
  pointer-events:none;
  animation:ringRot 20s linear infinite reverse;
}

/* Pointer */
.ptr-wrap{
  position:absolute;
  top:-28px;left:50%;
  transform:translateX(-50%);
  z-index:20;
}

#wheel{
  display:block;
  border-radius:50%;
  position:relative;z-index:5;
  transition:box-shadow 0.4s;
  box-shadow:
    0 4px 30px rgba(0,0,0,0.12),
    0 1px 4px rgba(0,0,0,0.08);
}
.wheel-wrap.spinning #wheel{
  box-shadow:
    0 8px 60px rgba(255,107,107,0.35),
    0 4px 20px rgba(196,77,255,0.25),
    0 0 80px rgba(255,179,71,0.2);
}

/* BUTTON */
.btn-outer{
  position:relative;
  display:inline-block;
}
/* shadow layer */
.btn-outer::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:100px;
  background:#1a1a1a;
  transform:translateY(5px);
  z-index:0;
  transition:transform 0.12s;
}
.btn-outer:hover::after{transform:translateY(7px)}
.btn-outer:active::after{transform:translateY(2px)}

#spinBtn{
  position:relative;z-index:1;
  background:#ff3d5a;
  color:#fff;
  border:none;cursor:pointer;outline:none;
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:1.6rem;
  letter-spacing:1px;
  padding:1rem 3.5rem;
  border-radius:100px;
  border:3px solid #1a1a1a;
  transition:transform 0.12s, background 0.2s;
  display:flex;align-items:center;gap:10px;
}
#spinBtn:hover:not(:disabled){transform:translateY(-2px);background:#ff2244}
#spinBtn:active:not(:disabled){transform:translateY(3px);background:#cc1a33}
#spinBtn:disabled{opacity:0.5;cursor:default}

/* BADGE */
#badge{
  font-size:0.78rem;
  letter-spacing:3px;
  text-transform:uppercase;
  font-weight:400;
  color:#aaa;
}
#badge.fri{color:#ff3d5a;font-weight:500}
#badge.locked{color:#aaa;font-weight:400}

.wheel-wrap.locked{cursor:not-allowed}
.wheel-wrap.locked::after{
  content:'🔒';
  position:absolute;
  inset:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  font-size:5rem;
  border-radius:50%;
  background:rgba(245,240,232,0.75);
  backdrop-filter:blur(6px);
}
.btn-outer.locked-btn::after{background:#999!important}
#spinBtn:disabled{background:#ccc!important;box-shadow:none}

/* MODAL */
#modal{
  display:none;
  position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;
  flex-direction:column;
  cursor:pointer;
}
#modal.open{display:flex}

#modal-bg{
  position:fixed;inset:0;
  background:rgba(245,240,232,0.95);
  backdrop-filter:blur(30px) saturate(1.8);
  animation:bgIn 0.3s ease;
}
@keyframes bgIn{from{opacity:0}to{opacity:1}}

#modal-content{
  position:relative;z-index:1;
  animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;flex-direction:column;align-items:center;
  gap:0;
  cursor:default;
}
@keyframes popIn{
  from{opacity:0;transform:scale(0.85) rotate(-4deg)}
  to{opacity:1;transform:scale(1) rotate(0)}
}

.gif-frame{
  position:relative;
  border:4px solid #1a1a1a;
  border-radius:24px;
  overflow:hidden;
  box-shadow:8px 8px 0 #1a1a1a;
}
.gif-frame img{
  display:block;
  max-width:min(92vw,680px);
  max-height:68vh;
  object-fit:contain;
}

/* colored corner accents */
.gif-frame::before{
  content:'';
  position:absolute;
  top:-4px;right:-4px;
  width:40px;height:40px;
  background:#ffe08a;
  border-radius:0 20px 0 0;
  z-index:10;
}
.gif-frame::after{
  content:'';
  position:absolute;
  bottom:-4px;left:-4px;
  width:40px;height:40px;
  background:#c44dff;
  border-radius:0 0 0 20px;
  z-index:10;
}

#modal-close-hint{
  font-size:0.72rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#bbb;
  margin-top:0.9rem;
  cursor:pointer;
}

/* Song card */
.song-card{
  display:flex;flex-direction:column;align-items:center;gap:0.4rem;
  width:min(88vw,440px);
  position:fixed;
  bottom:1.8rem;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
  visibility:hidden;
}
.song-label{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:0.58rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#ccc;
  display:flex;align-items:center;gap:6px;
}
.song-label::before,.song-label::after{
  content:'';display:block;
  width:16px;height:1px;background:#e0e0e0;
}
.spotify-embed{
  width:100%;
  border-radius:10px;
  overflow:hidden;
  border:2px solid #1a1a1a;
  box-shadow:2px 2px 0 #1a1a1a;
}
.spotify-embed iframe{
  display:block;width:100%;border:none;
}

/* CONFETTI */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.cf{position:absolute;top:-20px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(115vh) rotate(900deg);opacity:0}}

/* Floating emojis in bg */
.float-emoji{
  position:fixed;
  font-size:2rem;
  pointer-events:none;
  z-index:0;
  opacity:0.12;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  from{transform:translateY(110vh) rotate(0deg);opacity:0}
  10%{opacity:0.12}
  90%{opacity:0.12}
  to{transform:translateY(-10vh) rotate(720deg);opacity:0}
}
</style>
</head>
<body>

<div id="confetti"></div>

<!-- Floating background emojis -->
<div class="float-emoji" style="left:8%;animation-duration:18s;animation-delay:0s">🎉</div>
<div class="float-emoji" style="left:20%;animation-duration:22s;animation-delay:3s">✨</div>
<div class="float-emoji" style="left:35%;animation-duration:15s;animation-delay:7s">🎊</div>
<div class="float-emoji" style="left:55%;animation-duration:20s;animation-delay:1s">🍾</div>
<div class="float-emoji" style="left:70%;animation-duration:17s;animation-delay:5s">🎈</div>
<div class="float-emoji" style="left:85%;animation-duration:25s;animation-delay:9s">🎶</div>
<div class="float-emoji" style="left:92%;animation-duration:14s;animation-delay:4s">🕺</div>
<div class="float-emoji" style="left:45%;animation-duration:19s;animation-delay:11s">🥳</div>

<div class="everything">
  <div>
    <h1>Fredagsgif<br><em>hjulet</em></h1>
    <p class="sub">spinn for å få vekas fredagsgif</p>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div class="dashed-ring"></div>
    <svg class="dot-ring" viewBox="0 0 480 480" style="position:absolute;inset:-14px;width:calc(100% + 28px);height:calc(100% + 28px)">
      <circle cx="240" cy="240" r="236" fill="none" stroke="transparent"/>
      <!-- dots generated by JS -->
      <g id="ringDots"></g>
    </svg>

    <div class="ptr-wrap">
      <svg width="36" height="46" viewBox="0 0 36 46">
        <polygon points="18,44 2,4 34,4" fill="#ff3d5a" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
        <polygon points="18,38 8,8 28,8" fill="#ff7a8a" opacity="0.5"/>
      </svg>
    </div>

    <canvas id="wheel" width="420" height="420"></canvas>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:0.7rem">
    <div class="btn-outer">
      <button id="spinBtn">🎰 SPIN!</button>
    </div>
    <div id="badge"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal" onclick="closeModal()">
  <div id="modal-bg"></div>
  <div id="modal-content" onclick="event.stopPropagation()">
    <div class="gif-frame">
      <img id="mImg" src="" alt="">
    </div>
    <div class="song-card" id="songCard">
      <div class="song-label">🎵 vekas fredagslåt 🎵</div>
      <div class="spotify-embed">
        <iframe id="spotifyEmbed" height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
      <a id="spotifyLink" href="#" target="_blank" style="display:none"></a>
    </div>
    <div id="modal-close-hint">klikk kor som helst for å lukke · esc</div>
  </div>
</div>

const dotsG = document.getElementById('ringDots');
const nDots = 48;
for(let i=0;i<nDots;i++){
  const a = (i/nDots)*Math.PI*2;
  const x = 240 + Math.cos(a)*236;
  const y = 240 + Math.sin(a)*236;
  const c = ['#ff3d5a','#ffe08a','#c44dff','#ff7b47','#1a1a1a'][i%5];
  const r = i%4===0 ? 5 : i%2===0 ? 3.5 : 2.5;
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',x); dot.setAttribute('cy',y);
  dot.setAttribute('r',r); dot.setAttribute('fill',c);
  dot.setAttribute('opacity', i%4===0 ? '0.7' : '0.45');
  dotsG.appendChild(dot);
}

/* Wheel */
const N=GIFS.length, ARC=(2*Math.PI)/N;
const wC=document.getElementById('wheel');
const ctx=wC.getContext('2d');
const CX=wC.width/2, CY=wC.height/2, R=CX-6;

// Warm, playful palette — cream/pastel tones
const SEG_BG   = ['#fff5f5','#fffbf0','#f8f0ff','#f0fff8','#fff0f8','#f0f8ff'];
const SEG_ACC  = ['#ff3d5a','#ff9f1c','#c44dff','#1ab87c','#ff6b9d','#4d8fff'];
const SEG_RIM  = ['#ff3d5a','#ffb347','#c44dff','#1ab87c','#ff6b9d','#4d8fff'];

const thumbs=GIFS.map(g=>{const i=new Image();i.src=g.thumb;return i});
let loaded=0;
thumbs.forEach(i=>{i.onload=i.onerror=()=>{if(++loaded===N)drawWheel(angle)}});

let angle=-Math.PI/2, spinning=false;
drawWheel(angle);

function drawWheel(rot){
  ctx.clearRect(0,0,wC.width,wC.height);

  for(let i=0;i<N;i++){
    const s=rot+i*ARC, e=s+ARC, mid=s+ARC/2;
    const nx=Math.cos(mid), ny=Math.sin(mid);

    // Slice
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,s,e);ctx.closePath();
    ctx.fillStyle=SEG_BG[i];
    ctx.fill();

    // Thick coloured rim arc
    ctx.save();
    ctx.beginPath();ctx.arc(CX,CY,R,s+0.015,e-0.015);
    ctx.strokeStyle=SEG_RIM[i];ctx.lineWidth=12;
    ctx.stroke();ctx.restore();

    // Inner thin line rim
    ctx.save();
    ctx.beginPath();ctx.arc(CX,CY,R-12,s+0.02,e-0.02);
    ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=1;
    ctx.stroke();ctx.restore();

    // Spoke
    ctx.save();
    ctx.beginPath();ctx.moveTo(CX,CY);
    ctx.lineTo(CX+Math.cos(s)*R,CY+Math.sin(s)*R);
    ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=1.5;
    ctx.stroke();ctx.restore();

    // Thumbnail
    const dist=R*0.58, sz=90;
    const ix=CX+nx*dist, iy=CY+ny*dist;
    ctx.save();
    ctx.translate(ix,iy);ctx.rotate(mid+Math.PI/2);
    // shadow
    ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
    ctx.beginPath();ctx.roundRect(-sz/2,-sz/2,sz,sz,10);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.shadowColor='transparent';
    // clip image
    ctx.beginPath();ctx.roundRect(-sz/2,-sz/2,sz,sz,10);ctx.clip();
    const img=thumbs[i];
    if(img.complete&&img.naturalWidth>0)ctx.drawImage(img,-sz/2,-sz/2,sz,sz);
    else{ctx.fillStyle=SEG_ACC[i]+'44';ctx.fillRect(-sz/2,-sz/2,sz,sz)}
    ctx.restore();

    // Accent border on thumb
    ctx.save();
    ctx.translate(ix,iy);ctx.rotate(mid+Math.PI/2);
    ctx.beginPath();ctx.roundRect(-sz/2-2,-sz/2-2,sz+4,sz+4,11);
    ctx.strokeStyle=SEG_ACC[i];ctx.lineWidth=3;ctx.stroke();
    ctx.restore();
  }

  // Center hub — white circle with black border
  ctx.save();
  ctx.beginPath();ctx.arc(CX,CY,32,0,Math.PI*2);
  ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=12;
  ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#ff3d5a';
  ctx.font='bold 22px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('★',CX,CY+1);
  ctx.restore();
}

/* Day logic */
const now=new Date();
const day=now.getDay();
const month=now.getMonth()+1;
const date=now.getDate();
const isApr30=month===4&&date===30;
const isFri=day===5;
const isOpen=isFri||isApr30;

const bdg=document.getElementById('badge');
if(isFri){bdg.textContent='🎉 Det er FREDAG — spinn i veg!';bdg.className='fri'}
else if(isApr30){bdg.textContent='🌹 30. april — ein slags fredag. Spinn du!';bdg.className='fri'}
else{
  const DAYS=['sundag','måndag','tysdag','onsdag','torsdag','fredag','laurdag'];
  bdg.textContent='🔒 Det er '+DAYS[day]+'. Kom tilbake på fredag.';
  bdg.className='locked';
}

if(!isOpen){
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('wheelWrap').classList.add('locked');
  document.querySelector('.btn-outer').classList.add('locked-btn');
}

/* Spin */
function ease(t){return 1-Math.pow(1-t,5)}

document.getElementById('spinBtn').addEventListener('click',()=>{
  if(spinning)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('wheelWrap').classList.add('spinning');

  const delta=(8+Math.random()*7)*Math.PI*2+Math.random()*Math.PI*2;
  const dur=4200+Math.random()*1500;
  const t0=performance.now(),a0=angle;

  (function tick(now){
    const p=Math.min((now-t0)/dur,1);
    angle=a0+delta*ease(p);
    drawWheel(angle);
    if(p<1){requestAnimationFrame(tick);return}
    angle=(a0+delta)%(2*Math.PI);
    spinning=false;
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('wheelWrap').classList.remove('spinning');
    showResult();
  })(performance.now());
});

function showResult(){
  const norm=((-Math.PI/2-angle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(norm/ARC)%N;
  document.getElementById('mImg').src=GIFS[idx].src;

  // Pick random song
  const song=SONGS[Math.floor(Math.random()*SONGS.length)];
  document.getElementById('spotifyEmbed').src=
    `https://open.spotify.com/embed/track/${song.id}?utm_source=generator&theme=0`;
  document.getElementById('spotifyLink').href=song.url;
  document.getElementById('songCard').style.visibility='visible';

  document.getElementById('modal').classList.add('open');
  boom();
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.getElementById('songCard').style.visibility='hidden';
  document.getElementById('spotifyEmbed').src='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* Confetti */
function boom(){
  const w=document.getElementById('confetti');w.innerHTML='';
  const cols=['#ff3d5a','#ffe08a','#c44dff','#ff9f1c','#1ab87c','#4d8fff','#ff6b9d','#fff'];
  for(let i=0;i<120;i++){
    const el=document.createElement('div');el.className='cf';
    const sz=5+Math.random()*14;
    const strip=Math.random()>0.45;
    el.style.cssText=`
      left:${Math.random()*100}%;
      width:${sz}px;height:${strip?sz*0.35+2:sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${strip?'2px':'50%'};
      animation-duration:${1.6+Math.random()*2.8}s;
      animation-delay:${Math.random()*0.6}s;
    `;
    w.appendChild(el);
  }
  setTimeout(()=>w.innerHTML='',6000);
}
